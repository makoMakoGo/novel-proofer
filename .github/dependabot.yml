version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "quarterly"
      time: "09:00"
      timezone: "Asia/Shanghai"
    cooldown:
      default-days: 60
    open-pull-requests-limit: 1
    groups:
      python:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "quarterly"
    open-pull-requests-limit: 0

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "semiannually"
      time: "10:00"
      timezone: "Asia/Shanghai"
    cooldown:
      default-days: 90
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
