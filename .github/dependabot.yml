version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    cooldown:
      default-days: 30
    open-pull-requests-limit: 2
    groups:
      python:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Shanghai"
    cooldown:
      default-days: 30
    open-pull-requests-limit: 2
    groups:
      npm:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "10:00"
      timezone: "Asia/Shanghai"
    cooldown:
      default-days: 30
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"
