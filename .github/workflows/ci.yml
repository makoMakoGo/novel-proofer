name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: lint + test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            python-version: "3.14"
          - os: ubuntu-latest
            python-version: "3.12"
    env:
      NOVEL_PROOFER_RUN_LLM_TESTS: "false"
      UV_NO_PROGRESS: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync deps
        shell: bash
        run: |
          uv sync --frozen --no-install-project --group dev
      - name: Ruff format (check)
        shell: bash
        run: |
          uv run --frozen --no-sync ruff format --check
      - name: Ruff lint
        shell: bash
        run: |
          uv run --frozen --no-sync ruff check
      - name: Mypy
        shell: bash
        run: |
          uv run --frozen --no-sync python -m mypy novel_proofer
      - name: Validate agent instructions
        if: runner.os == 'Linux'
        shell: bash
        run: |
          uv run --frozen --no-sync python tools/check-agents.py
      - name: Pytest
        shell: bash
        run: |
          uv run --frozen --no-sync python -m pytest -q
      - name: Check OpenAPI schema freshness
        if: runner.os == 'Linux'
        shell: bash
        run: |
          uv run --frozen --no-sync python tools/export-openapi.py --check
      - name: Check tracked file sizes
        if: runner.os == 'Linux'
        shell: bash
        run: |
          uv run --frozen --no-sync python tools/check-large-files.py
